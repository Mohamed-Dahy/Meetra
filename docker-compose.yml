# =============================================================================
# Meetra — Docker Compose
# Orchestrates all 3 services: Backend, Chatbot, Frontend
# =============================================================================
#
# HOW TO RUN:
#   1. Copy .env.example to .env and fill in your real secrets
#   2. docker compose up --build        (first time — builds images + starts)
#   3. docker compose up                (subsequent runs — skips rebuild)
#   4. docker compose down              (stop and remove containers)
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BACKEND — Node.js + Express API (port 5000)
  # ---------------------------------------------------------------------------
  backend:
    # "build" tells Compose to build the image from the Backend/Dockerfile
    # instead of pulling a pre-built image from a registry.
    build: ./Backend

    # Map host port 5000 → container port 5000.
    # Format is "HOST:CONTAINER". The frontend and chatbot talk to the backend
    # via http://backend:5000 inside Docker's internal network (using the
    # service name as hostname). Port 5000 on the host is exposed so you can
    # also call the API directly from your machine during development.
    ports:
      - "5000:5000"

    # Load environment variables from the .env file in the repo root.
    # These are injected into the container at runtime — they are never baked
    # into the image, so secrets stay out of image layers.
    env_file:
      - .env

    # Named volumes for persistent storage.
    # uploads/ — audio files uploaded for transcription
    # pdfs/    — generated PDF exports
    # Without volumes, these files would be lost every time the container
    # restarts. Named volumes are managed by Docker and persist independently
    # of the container lifecycle.
    volumes:
      - uploads_data:/app/uploads
      - pdfs_data:/app/pdfs

    # Restart the container automatically if it crashes.
    # "unless-stopped" means: always restart on crash, but respect a manual
    # "docker compose stop" — don't restart if you intentionally stopped it.
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CHATBOT — Python FastAPI + LangGraph agent (port 8000)
  # ---------------------------------------------------------------------------
  chatbot:
    # The folder name has a space so it must be quoted.
    build: "./Chat_Bot LangGraph"

    ports:
      - "8000:8000"

    # Shares the same .env file — only reads MONGO_URI and GEMINI_API_KEY.
    # Extra variables in .env (JWT_SECRET, RESEND_API_KEY etc.) are simply
    # ignored by the chatbot since config.py only declares what it needs.
    env_file:
      - .env

    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND — React + Vite SPA served by Nginx (port 80)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend

      # VITE_* variables are baked into the JS bundle at build time.
      # They must be passed here as build args — you cannot change them
      # after the image is built without rebuilding.
      #
      # These point to localhost because this Compose file is for running
      # everything locally on one machine. For production deployment on a
      # real server/domain, change these to your actual public URLs before
      # running docker compose build.
      args:
        VITE_API_BASE_URL: http://localhost:5000/meetra
        VITE_CHATBOT_URL: http://localhost:8000

    ports:
      - "80:80"

    # depends_on ensures backend and chatbot containers are started before
    # the frontend container starts. Note: this only guarantees start ORDER,
    # not that the services are fully ready — for a dev setup this is fine.
    depends_on:
      - backend
      - chatbot

    restart: unless-stopped

# =============================================================================
# NAMED VOLUMES
# Declaring volumes here at the top level registers them with Docker.
# Data written to these paths inside the backend container persists across
# container restarts, re-creates, and even "docker compose down" (volumes are
# only deleted with "docker compose down -v").
# =============================================================================
volumes:
  uploads_data:
  pdfs_data:
