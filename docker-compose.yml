# =============================================================================
# Meetra — Docker Compose
# Orchestrates all 3 services: Backend, Chatbot, Frontend
# =============================================================================
#
# HOW TO RUN:
#   1. Copy .env.example to .env and fill in your real secrets
#   2. docker compose up --build        (first time — builds images + starts)
#   3. docker compose up                (subsequent runs — skips rebuild)
#   4. docker compose down              (stop and remove containers)
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BACKEND — Node.js + Express API (port 5000)
  # ---------------------------------------------------------------------------
  backend:
    # "build" tells Compose to build the image from the Backend/Dockerfile
    # instead of pulling a pre-built image from a registry.
    build: ./Backend

    # Map host port 5000 → container port 5000.
    # Format is "HOST:CONTAINER". The frontend and chatbot talk to the backend
    # via http://backend:5000 inside Docker's internal network (using the
    # service name as hostname). Port 5000 on the host is exposed so you can
    # also call the API directly from your machine during development.
    ports:
      - "5000:5000"

    # Load environment variables from the .env file in the repo root.
    # These are injected into the container at runtime — they are never baked
    # into the image, so secrets stay out of image layers.
    env_file:
      - .env

    # Named volumes for persistent storage.
    # uploads/ — audio files uploaded for transcription
    # pdfs/    — generated PDF exports
    # Without volumes, these files would be lost every time the container
    # restarts. Named volumes are managed by Docker and persist independently
    # of the container lifecycle.
    volumes:
      - uploads_data:/app/uploads
      - pdfs_data:/app/pdfs

    # Docker HEALTHCHECK — Docker pings GET /meetra/health every 30s.
    # After 3 consecutive failures the container is marked "unhealthy" and
    # Docker will restart it (combined with restart: unless-stopped).
    # interval: how often to check | timeout: per-request deadline
    # start_period: grace window after container starts (lets Node connect to Atlas)
    # retries: failures before "unhealthy"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/meetra/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    # Restart the container automatically if it crashes.
    # "unless-stopped" means: always restart on crash, but respect a manual
    # "docker compose stop" — don't restart if you intentionally stopped it.
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # REDIS — in-memory store for chatbot session persistence + rate limiting
  # ---------------------------------------------------------------------------
  redis:
    # redis:7-alpine is the official lightweight image (~30 MB).
    # We don't build a custom image — the official one is all we need.
    image: redis:7-alpine

    # Port 6379 is exposed to the host so you can inspect sessions during
    # development with redis-cli from your machine:
    #   redis-cli -h localhost keys "session:*"
    # Inside the Docker network, the chatbot connects via the service name:
    #   redis://redis:6379/0
    ports:
      - "6379:6379"

    # --appendonly yes enables AOF (Append-Only File) persistence.
    # Without this, Redis stores data only in RAM — a container restart loses
    # all sessions. AOF writes every command to /data/appendonly.aof so
    # sessions survive clean restarts. The redis_data named volume keeps
    # /data on the host across container re-creates.
    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    # HEALTHCHECK — redis-cli ping returns "PONG" when Redis is ready.
    # The chatbot uses condition: service_healthy (below) so it never starts
    # before Redis is accepting connections.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CHATBOT — Python FastAPI + LangGraph agent (port 8000)
  # ---------------------------------------------------------------------------
  chatbot:
    # The folder name has a space so it must be quoted.
    build: "./Chat_Bot LangGraph"

    ports:
      - "8000:8000"

    # Reads MONGO_URI, GEMINI_API_KEY, JWT_SECRET, REDIS_URI from .env.
    # Extra variables (RESEND_API_KEY etc.) are simply ignored because
    # config.py only declares what it needs.
    env_file:
      - .env

    # depends_on with condition: service_healthy means Docker waits until
    # Redis passes its healthcheck (redis-cli ping → PONG) before starting
    # the chatbot. Without this, the chatbot lifespan's redis_client.connect()
    # PING could fail if Redis is still initialising.
    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND — React + Vite SPA served by Nginx (port 80)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend

      # VITE_* variables are baked into the JS bundle at build time.
      # They must be passed here as build args — you cannot change them
      # after the image is built without rebuilding.
      #
      # These point to localhost because this Compose file is for running
      # everything locally on one machine. For production deployment on a
      # real server/domain, change these to your actual public URLs before
      # running docker compose build.
      args:
        VITE_API_BASE_URL: http://localhost:5000/meetra/v1
        VITE_CHATBOT_URL: http://localhost:8000

    ports:
      - "80:80"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

    # depends_on ensures backend and chatbot containers are started before
    # the frontend container starts. Note: this only guarantees start ORDER,
    # not that the services are fully ready — for a dev setup this is fine.
    depends_on:
      - backend
      - chatbot

    restart: unless-stopped

# =============================================================================
# NAMED VOLUMES
# Declaring volumes here at the top level registers them with Docker.
# Data written to these paths inside the backend container persists across
# container restarts, re-creates, and even "docker compose down" (volumes are
# only deleted with "docker compose down -v").
# =============================================================================
volumes:
  uploads_data:   # Backend audio uploads
  pdfs_data:      # Backend generated PDF reports
  redis_data:     # Redis AOF persistence (chatbot sessions + rate limit state)
