server {
    listen 80;

    # Root directory where Nginx serves files from — matches where we copied dist/
    root /usr/share/nginx/html;
    index index.html;

    # Health check — returns 200 immediately without loading the SPA.
    # Used by Docker HEALTHCHECK and uptime monitors (UptimeRobot, Render, etc.).
    location = /health {
        access_log off;          # don't flood access logs with health pings
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # SPA fallback rule:
    # Try to serve the exact file ($uri), then a directory ($uri/),
    # and if neither exists fall back to index.html.
    # React Router intercepts the URL after index.html loads and renders
    # the correct component — so /dashboard, /auth, etc. all work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: tell browsers to cache static assets (JS/CSS/images) aggressively.
    # Vite adds a content hash to filenames (e.g. main.a3f9c1.js) so stale cache
    # is never a problem — new deploys produce new filenames automatically.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
